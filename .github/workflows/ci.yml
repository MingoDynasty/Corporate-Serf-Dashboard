name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validation:
    name: Python validation
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
          cache-dependency-glob: |
            pyproject.toml
            uv.lock

      - name: Install Python
        run: uv python install 3.14

      - name: Run tests
        run: uv run --frozen pytest tests

      - name: Run Ruff
        run: uv run --frozen ruff check source tests

      - name: Compile Python files
        run: uv run --frozen python -m compileall source tests
