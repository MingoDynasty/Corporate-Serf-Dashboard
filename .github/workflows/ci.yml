# tooling-spec: python-v2
name: CI

on:
    pull_request:
    push:
        branches: [main]

permissions:
    contents: read

jobs:
    test:
        strategy:
            fail-fast: false
            matrix:
                # the one sanctioned per-repo knob: repos may extend this list
                os: [windows-latest]
        runs-on: ${{ matrix.os }}
        env:
            UV_NO_SYNC: '1'
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
            - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
              with:
                  enable-cache: false
            - name: Install dependencies
              run: uv sync --locked
            - name: Format check
              run: uv run ruff format --check .
            - name: Lint
              run: uv run ruff check .
            - name: Type check
              run: uv run mypy
            - name: Run tests
              run: uv run pytest
            # Kept out of pytest: it depends on the network and on GitHub having
            # the commit, so a flake must block a merge without breaking local
            # test runs. The PR head SHA is used because the merge ref may not
            # be archivable.
            - name: Verify version.txt export-subst expansion
              shell: pwsh
              env:
                  ARCHIVE_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
              run: |
                  $ErrorActionPreference = 'Stop'
                  $url = "https://github.com/${{ github.repository }}/archive/$env:ARCHIVE_SHA.zip"
                  $zip = Join-Path $env:RUNNER_TEMP 'archive.zip'
                  $extracted = Join-Path $env:RUNNER_TEMP 'archive'
                  $downloaded = $false
                  foreach ($attempt in 1..3) {
                      try {
                          Invoke-WebRequest -Uri $url -OutFile $zip -UseBasicParsing
                          $downloaded = $true
                          break
                      } catch {
                          Write-Host "Attempt ${attempt} failed: $($_.Exception.Message)"
                          if ($attempt -lt 3) { Start-Sleep -Seconds (5 * $attempt) }
                      }
                  }
                  if (-not $downloaded) { throw "Could not download $url" }
                  Expand-Archive -Path $zip -DestinationPath $extracted -Force
                  $stamp = Get-ChildItem -Path $extracted -Filter 'version.txt' -Recurse |
                      Select-Object -First 1
                  if (-not $stamp) { throw 'version.txt is missing from the archive' }
                  $content = Get-Content -Raw -Path $stamp.FullName
                  Write-Host $content
                  if ($content -match '\$Format') {
                      throw 'export-subst placeholders were not expanded'
                  }
                  $sha = [regex]::Match($content, '(?m)^sha:\s*([0-9a-f]{40})\s*$').Groups[1].Value
                  $date = [regex]::Match($content, '(?m)^commit-date:\s*(\d{4}-\d{2}-\d{2})\s*$').Groups[1].Value
                  if (-not $sha) { throw 'version.txt has no usable sha' }
                  if (-not $date) { throw 'version.txt has no usable commit-date' }
                  if ($sha -ne $env:ARCHIVE_SHA) {
                      throw "version.txt sha $sha does not match $env:ARCHIVE_SHA"
                  }

    # Decides whether this push is worth releasing. Split from `release` so a
    # docs-only push never enters the serialized release concurrency group.
    release-gate:
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        runs-on: ubuntu-latest
        outputs:
            release: ${{ steps.gate.outputs.release }}
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  fetch-depth: 0
            - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
              with:
                  enable-cache: false
            - name: Decide whether to release
              id: gate
              env:
                  BEFORE: ${{ github.event.before }}
              run: |
                  set -euo pipefail
                  # Diff the whole pushed range, not just the tip commit, so a
                  # multi-commit push cannot hide a runtime change behind a
                  # docs-only tip. When `before` is unusable -- a new ref, a
                  # force push, or a pruned base -- the pushed range is
                  # unknowable, so release rather than narrowing the diff to
                  # HEAD~1: that would inspect one commit of a range we already
                  # admitted we cannot see, and a missed release is the costly
                  # direction.
                  if [ -z "${BEFORE:-}" ] ||
                     [ "$BEFORE" = "0000000000000000000000000000000000000000" ] ||
                     ! git cat-file -e "${BEFORE}^{commit}" 2>/dev/null ||
                     ! git merge-base --is-ancestor "$BEFORE" HEAD; then
                      echo "Pushed range is unknowable; releasing conservatively."
                      echo "release=true" >> "$GITHUB_OUTPUT"
                      exit 0
                  fi
                  # --no-renames is load-bearing: rename detection reports only
                  # a rename's destination, so moving a runtime file into
                  # docs/, tests/, .github/, or a *.md name would look like a
                  # blocked-only push while the installed tree actually loses
                  # that file. Reporting the delete and the add separately keeps
                  # the source path visible.
                  git diff --name-only --no-renames "$BEFORE" HEAD > changed-paths.txt
                  echo "Changed paths since ${BEFORE}:"
                  cat changed-paths.txt
                  decision=$(uv run --no-project --python "$(cat .python-version)" \
                      python scripts/release_job.py should-release \
                      --paths-from changed-paths.txt)
                  echo "Release: $decision"
                  echo "release=$decision" >> "$GITHUB_OUTPUT"

    # Cuts a CalVer tag and an immutable GitHub Release for every push to main
    # that changes what users run. Runs on Linux, not Windows like `test`:
    # `git archive` honours core.autocrlf, so a Windows runner would ship CRLF
    # blobs that differ from both the committed blobs and GitHub's own source
    # archive (the documented fallback when the named asset is missing).
    release:
        needs: [test, release-gate]
        if: >-
            github.event_name == 'push' && github.ref == 'refs/heads/main'
            && needs.release-gate.outputs.release == 'true'
        runs-on: ubuntu-latest
        permissions:
            contents: write
        concurrency:
            group: release
            cancel-in-progress: false
            # Releases must serialize but must never be dropped: the default
            # queue holds one run per group and discards the rest.
            queue: max
        env:
            GH_TOKEN: ${{ github.token }}
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
              with:
                  fetch-depth: 0
            - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
              with:
                  enable-cache: false

            - name: Resolve release tag
              id: tag
              run: |
                  set -euo pipefail
                  git fetch --tags --force --quiet
                  # A rerun of a job that already tagged must reuse that tag
                  # rather than mint a second one for the same commit.
                  existing=$(git tag --points-at HEAD |
                      grep -E '^v[0-9]{4}\.[0-9]{2}\.[0-9]{2}(\.[0-9]+)?$' |
                      head -n 1 || true)
                  if [ -n "$existing" ]; then
                      tag="$existing"
                      echo "Reusing existing tag $tag"
                  else
                      tag=$(git tag --list | uv run --no-project \
                          --python "$(cat .python-version)" \
                          python scripts/release_job.py next-tag \
                          --date "$(date -u +%Y-%m-%d)")
                      echo "Computed new tag $tag"
                  fi
                  echo "tag=$tag" >> "$GITHUB_OUTPUT"
                  echo "asset=Corporate-Serf-Dashboard-$tag.zip" >> "$GITHUB_OUTPUT"
                  echo "commit_date=$(git show -s --format=%cs HEAD)" >> "$GITHUB_OUTPUT"

            - name: Create and push tag
              env:
                  TAG: ${{ steps.tag.outputs.tag }}
              run: |
                  set -euo pipefail
                  if ! git rev-parse -q --verify "refs/tags/$TAG" >/dev/null; then
                      git tag "$TAG" "$GITHUB_SHA"
                  fi
                  tagged=$(git rev-parse "refs/tags/$TAG^{commit}")
                  if [ "$tagged" != "$GITHUB_SHA" ]; then
                      echo "::error::$TAG points at $tagged, expected $GITHUB_SHA"
                      exit 1
                  fi
                  git push origin "refs/tags/$TAG"

            - name: Build release assets
              env:
                  TAG: ${{ steps.tag.outputs.tag }}
                  ASSET: ${{ steps.tag.outputs.asset }}
                  COMMIT_DATE: ${{ steps.tag.outputs.commit_date }}
              run: |
                  set -euo pipefail
                  # git archive is the only producer that expands the
                  # export-subst stamp in version.txt; zipping a checkout would
                  # ship the raw $Format placeholders.
                  git archive --format=zip \
                      --prefix="Corporate-Serf-Dashboard-$TAG/" \
                      --output "$ASSET" "refs/tags/$TAG"
                  uv run --no-project --python "$(cat .python-version)" \
                      python scripts/release_job.py release-json \
                      --tag "$TAG" --sha "$GITHUB_SHA" \
                      --commit-date "$COMMIT_DATE" --output release.json
                  cat release.json

            - name: Create or resume draft release
              id: draft
              env:
                  TAG: ${{ steps.tag.outputs.tag }}
              run: |
                  set -euo pipefail
                  # Only a genuine "not found" may take the create path. A
                  # transient API error must not look like "no release yet":
                  # GitHub accepts a second draft for a tag that already has
                  # one, and the duplicate would then compete for the assets
                  # and the publish.
                  if state=$(gh release view "$TAG" --json isDraft --jq .isDraft 2>view-error.txt); then
                      if [ "$state" = "false" ]; then
                          echo "Release $TAG is already published; nothing to do."
                          echo "already_published=true" >> "$GITHUB_OUTPUT"
                          exit 0
                      fi
                      echo "Resuming the existing draft for $TAG"
                  elif grep -qi 'release not found' view-error.txt; then
                      gh release create "$TAG" --draft --title "$TAG" --generate-notes
                  else
                      cat view-error.txt >&2
                      echo "::error::could not determine whether $TAG already has a release"
                      exit 1
                  fi
                  echo "already_published=false" >> "$GITHUB_OUTPUT"

            - name: Attach assets to the draft
              if: steps.draft.outputs.already_published != 'true'
              env:
                  TAG: ${{ steps.tag.outputs.tag }}
                  ASSET: ${{ steps.tag.outputs.asset }}
              run: gh release upload "$TAG" "$ASSET" release.json --clobber

            # Publication is the point of no return: assets lock and the
            # release cannot be deleted, so everything checkable is checked
            # while this is still a draft.
            - name: Validate assets before publishing
              if: steps.draft.outputs.already_published != 'true'
              env:
                  TAG: ${{ steps.tag.outputs.tag }}
                  ASSET: ${{ steps.tag.outputs.asset }}
                  COMMIT_DATE: ${{ steps.tag.outputs.commit_date }}
              run: |
                  set -euo pipefail
                  uv run --no-project --python "$(cat .python-version)" \
                      python scripts/release_job.py validate \
                      --archive "$ASSET" --metadata release.json \
                      --tag "$TAG" --sha "$GITHUB_SHA" --commit-date "$COMMIT_DATE"
                  # Confirm the upload landed intact, since a truncated asset
                  # would be unrepairable once the release is published.
                  gh release view "$TAG" --json assets \
                      --jq '.assets[] | "\(.name) \(.size)"' > uploaded-assets.txt
                  cat uploaded-assets.txt
                  for name in "$ASSET" release.json; do
                      uploaded=$(awk -v n="$name" '$1 == n { print $2 }' uploaded-assets.txt)
                      expected=$(stat -c %s "$name")
                      if [ "$uploaded" != "$expected" ]; then
                          echo "::error::$name is '$uploaded' bytes on the release, expected $expected"
                          exit 1
                      fi
                  done

            - name: Publish release
              if: steps.draft.outputs.already_published != 'true'
              env:
                  TAG: ${{ steps.tag.outputs.tag }}
              run: |
                  set -euo pipefail
                  git fetch --tags --force --quiet
                  # Serialization is FIFO by wait-start time, not by commit
                  # order, so a slow older run can reach this point after a
                  # newer push has already published. Older source must never
                  # displace newer source as Latest.
                  make_latest=true
                  # Every published release must be considered, not a page of
                  # them: a draft resumed long after it was created can have
                  # any number of descendants, and missing one lets this older
                  # source reclaim Latest and downgrade every latest-tracking
                  # install. `gh release list --limit` is a cap, not a scan.
                  published=$(gh api --paginate "repos/$GITHUB_REPOSITORY/releases" \
                      --jq '.[] | select(.draft == false) | .tag_name')
                  for other in $published; do
                      if [ "$other" = "$TAG" ]; then
                          continue
                      fi
                      if ! other_sha=$(git rev-parse -q --verify "refs/tags/$other^{commit}"); then
                          echo "::warning::published release $other has no local tag; skipping ancestry check"
                          continue
                      fi
                      if [ "$other_sha" = "$GITHUB_SHA" ]; then
                          continue
                      fi
                      if git merge-base --is-ancestor "$GITHUB_SHA" "$other_sha"; then
                          echo "Published release $other descends from $GITHUB_SHA; not claiming Latest."
                          make_latest=false
                          break
                      fi
                  done
                  gh release edit "$TAG" --draft=false --latest="$make_latest"
                  if [ "$make_latest" = "true" ]; then
                      actual=$(gh api "repos/$GITHUB_REPOSITORY/releases/latest" --jq .tag_name)
                      if [ "$actual" != "$TAG" ]; then
                          echo "::error::releases/latest resolved to $actual, expected $TAG"
                          exit 1
                      fi
                  fi
                  echo "Published $TAG (latest=$make_latest)"
